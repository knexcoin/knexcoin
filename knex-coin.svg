<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
	 width="800px" height="800px" viewBox="0 0 256 256"
	 xml:space="preserve">
<rect width="256" height="256" fill="#ffffff"/>
<!-- ₿ constructed without relying on the codepoint glyph being in any font -->
<!-- The two vertical extensions of the ₿ stem -->
<rect x="106" y="34" width="20" height="28" fill="#111111"/>
<rect x="106" y="194" width="20" height="28" fill="#111111"/>
<!-- The "B" letter that the strokes extend through -->
<text x="60" y="200" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="200" fill="#111111" letter-spacing="-6">B</text>
</svg>
